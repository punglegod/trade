name: iOS CI

on:
  push:
    branches: ["main", "master", "develop"]
    paths:
      - "TradeReplayAssistant/**"
      - "TradeReplayAssistant.xcodeproj/**"
      - ".github/workflows/ios-ci.yml"
  pull_request:
    branches: ["main", "master", "develop"]
    paths:
      - "TradeReplayAssistant/**"
      - "TradeReplayAssistant.xcodeproj/**"
      - ".github/workflows/ios-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test (Simulator)
    runs-on: macos-latest
    timeout-minutes: 30

    env:
      PROJECT_PATH: TradeReplayAssistant.xcodeproj
      SCHEME: TradeReplayAssistant
      RESULT_BUNDLE_PATH: TestResults.xcresult
      BUILD_LOG_PATH: build.log

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode and SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Resolve Swift Package dependencies
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -resolvePackageDependencies

      - name: Pick an available iPhone simulator
        shell: bash
        run: |
          set -euo pipefail

          SIMULATOR_ID="$(xcrun simctl list devices available -j | python3 -c "import json,sys;devices=json.load(sys.stdin).get('devices',{});cands=[d['udid'] for rt in sorted(devices.keys(), reverse=True) if 'iOS' in rt for d in devices[rt] if d.get('isAvailable') and d.get('name','').startswith('iPhone')];print(cands[0] if cands else (_ for _ in ()).throw(SystemExit('No available iPhone simulator found on runner')))")"

          echo "SIMULATOR_ID=$SIMULATOR_ID" >> "$GITHUB_ENV"
          echo "Selected simulator: $SIMULATOR_ID"

      - name: Build app for simulator (no code signing)
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID,arch=arm64" \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | tee "$BUILD_LOG_PATH"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID,arch=arm64" \
            -resultBundlePath "$RESULT_BUNDLE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            test

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ${{ env.RESULT_BUNDLE_PATH }}
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: ${{ env.BUILD_LOG_PATH }}
          if-no-files-found: warn
